---
# Run with: ansible-playbook -i inventory.ini bootstrap.yml

- name: Common Proxmox node configuration
  hosts: proxmox
  gather_facts: true
  tasks:

    - name: Add cluster node entries to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED - cluster hosts"
        block: |
          {% for host in groups['proxmox'] %}
          {{ hostvars[host]['ansible_default_ipv4']['address'] }} {{ host }}.longsnet.com {{ host }}
          {% endfor %}

    - name: Disable PVE enterprise repository
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        regexp: '^(deb\s+.*)'
        replace: '# \1'

    - name: Check if Ceph enterprise list exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/ceph.list
      register: ceph_list

    - name: Disable Ceph enterprise repository
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/ceph.list
        regexp: '^(deb\s+.*)'
        replace: '# \1'
      when: ceph_list.stat.exists

    - name: Enable PVE no-subscription repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        content: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription\n"

    - name: Disable subscription nag dialog
      ansible.builtin.replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: "!res\\.data\\.active"
        replace: "false"

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - vim
          - htop
          - curl
        state: present
        update_cache: true

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required after upgrade
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists


- name: Set up inter-node SSH trust for cluster operations
  hosts: proxmox
  gather_facts: false
  tasks:

    - name: Ensure root has an SSH keypair
      ansible.builtin.user:
        name: root
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_file: /root/.ssh/id_ed25519

    - name: Fetch root public keys from all nodes
      ansible.builtin.fetch:
        src: /root/.ssh/id_ed25519.pub
        dest: /tmp/proxmox_keys/{{ inventory_hostname }}.pub
        flat: true

    - name: Authorize all node public keys on this node
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ lookup('file', '/tmp/proxmox_keys/' + item + '.pub') }}"
        create: true
        mode: '0600'
      loop: "{{ groups['proxmox'] }}"

    - name: Trust all cluster node SSH host keys
      ansible.builtin.shell: |
        key=$(ssh-keyscan {{ hostvars[item]['ansible_host'] }} 2>/dev/null)
        if [ -n "$key" ] && ! grep -qF "$key" /root/.ssh/known_hosts 2>/dev/null; then
          echo "$key" >> /root/.ssh/known_hosts
        fi
      loop: "{{ groups['proxmox'] }}"
      changed_when: false


- name: Create Proxmox cluster on pve01
  hosts: pve01
  gather_facts: true
  tasks:

    - name: Check current cluster status
      ansible.builtin.command: pvecm status
      register: cluster_status
      failed_when: false
      changed_when: false

    - name: Create cluster 'longsnet'
      ansible.builtin.command: >
        pvecm create longsnet
        --link0 {{ ansible_default_ipv4.address }}
      when: cluster_status.rc != 0

    - name: Wait for cluster to stabilize
      ansible.builtin.pause:
        seconds: 10
      when: cluster_status.rc != 0


- name: Join pve02 and pve03 to the cluster
  hosts: pve02,pve03
  serial: 1
  gather_facts: true
  tasks:

    - name: Check current cluster status
      ansible.builtin.command: pvecm status
      register: cluster_status
      failed_when: false
      changed_when: false

    - name: Join cluster via pve01
      ansible.builtin.command: >
        pvecm add pve01.longsnet.com
        --link0 {{ ansible_default_ipv4.address }}
      when: cluster_status.rc != 0

    - name: Wait for cluster membership to stabilize
      ansible.builtin.pause:
        seconds: 15
      when: cluster_status.rc != 0
